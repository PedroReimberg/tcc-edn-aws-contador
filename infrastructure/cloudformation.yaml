AWSTemplateFormatVersion: 2010-09-09
Description: CloudFormation Template

#Metadata:

#Parameters:

#Rules:

#Mappings:

#Conditions:

#Transform:

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DynamoDBTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 
        - "website-tcc-edn-${RandomSuffix}"
        - RandomSuffix: !Select [2, !Split ["-", !Ref AWS::StackId]]
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  MyBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${MyS3Bucket}/*"

  MyIAMLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IAMLambdaRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: StrictPermissionDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt MyDynamoDBTable.Arn
              
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  MyLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: LambdaFunction
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt MyIAMLambdaRole.Arn 
      Code:
        ZipFile: |
          import json
          import boto3
          
          # Conecta ao DynamoDB
          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('DynamoDBTable') 
          
          def lambda_handler(event, context):
              # Captura o método HTTP (GET ou POST) vindo do API Gateway V2
              http_method = event.get('requestContext', {}).get('http', {}).get('method', '')
              
              # Cabeçalhos de CORS exigidos pelo navegador
              headers = {
                  'Access-Control-Allow-Origin': '*', # Pode alterar para a URL do S3 depois por segurança, mas o API Gateway já bloqueia requisições de outras URLs
                  'Access-Control-Allow-Methods': 'GET,POST,OPTIONS',
                  'Access-Control-Allow-Headers': 'Content-Type'
              }
              
              try:
                  if http_method == 'GET':
                      # Apenas lê o banco de dados
                      response = table.get_item(Key={'id': 'hits'})
                      count = response.get('Item', {}).get('quantidade', 0)
                      return {'statusCode': 200, 'headers': headers, 'body': json.dumps({'hits': int(count)})}
                      
                  elif http_method == 'POST':
                      # Soma +1 no banco de dados
                      response = table.update_item(
                          Key={'id': 'hits'},
                          UpdateExpression='ADD quantidade :inc',
                          ExpressionAttributeValues={':inc': 1},
                          ReturnValues='UPDATED_NEW'
                      )
                      count = response['Attributes']['quantidade']
                      return {'statusCode': 200, 'headers': headers, 'body': json.dumps({'hits': int(count)})}

                  elif http_method == 'OPTIONS':
                      # Responde ao teste (Preflight) do navegador com sucesso
                      return {'statusCode': 200, 'headers': headers, 'body': ''}
                      
                  else:
                      return {'statusCode': 400, 'headers': headers, 'body': 'Metodo nao suportado'}
                      
              except Exception as e:
                  print(e) # O CloudWatch (autorizado na Role) vai gravar este erro
                  return {'statusCode': 500, 'headers': headers, 'body': 'Erro interno no servidor'}

  MyHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: APIWebsiteTCC
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          # É possivel receber requisições de qualquer URL usando:
          # - "*"
          - !Sub "http://${MyS3Bucket}.s3-website-${AWS::Region}.amazonaws.com"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MyHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MyLambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  APIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MyHttpApi
      RouteKey: "ANY /"
      Target: !Sub "integrations/${LambdaIntegration}"

  StageApi:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MyHttpApi
      StageName: "$default"
      AutoDeploy: true

  InvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MyLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MyHttpApi}/*/*"

Outputs:
  APIGatewayURL:
    Description: "Copie esta URL e cole no seu script.js"
    Value: !Sub "https://${MyHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
