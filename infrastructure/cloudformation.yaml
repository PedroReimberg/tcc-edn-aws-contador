AWSTemplateFormatVersion: 2010-09-09

Description: Sistema Web Serverless integrando S3 (Frontend Estático), API Gateway, AWS Lambda, DynamoDB e CloudFront

Metadata:
  # Author:
  Project: "TCC - Escola da Nuvem"
  Version: "1.0.0"

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DynamoDBTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      # O nome da stack deve ser escrito somente com letras minusculas
      BucketName: !Sub "${AWS::StackName}-website-tcc-${AWS::AccountId}" 
      # Alternativa para esconder o AccountId da URL do S3
      # BucketName: !Sub "${AWS::StackName}-website-tcc-${AWS::Region}"
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  MyBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${MyS3Bucket}/*"

  MyIAMLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IAMLambdaRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: StrictPermissionDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt MyDynamoDBTable.Arn
              
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  MyLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: LambdaFunction
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt MyIAMLambdaRole.Arn 
      Code:
        ZipFile: |
          import json
          import boto3

          # Conecta ao DynamoDB
          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('DynamoDBTable') 

          def lambda_handler(event, context):
              # Captura o método HTTP (GET ou POST) vindo do API Gateway V2
              http_method = event.get('requestContext', {}).get('http', {}).get('method', '')

              print(f"Nova requisição recebida! Método: {http_method}")
              
              # Cabeçalhos de CORS exigidos pelo navegador
              headers = {
                  'Access-Control-Allow-Origin': '*', # API Gateway já bloqueia requisições de outras URLs
                  'Access-Control-Allow-Methods': 'GET,POST,OPTIONS',
                  'Access-Control-Allow-Headers': 'Content-Type'
              }
              
              try:
                  if http_method == 'GET':
                      # Apenas lê o banco de dados
                      response = table.get_item(Key={'id': 'hits'})
                      count = response.get('Item', {}).get('quantidade', 0)
                      return {'statusCode': 200, 'headers': headers, 'body': json.dumps({'hits': int(count)})}
                      
                  elif http_method == 'POST':
                      # Lê o corpo enviado pelo frontend para saber a ação desejada
                      body_data = {}
                      if event.get('body'):
                          try:
                              body_data = json.loads(event.get('body'))
                          except Exception:
                              pass
                      
                      # Pega a ação ('increment' ou 'decrement'). Se não vier nada, assume increment.
                      action = body_data.get('action', 'increment')

                      print(f"Ação processada pelo DynamoDB: {action}")
                      
                      if action == 'decrement':
                          # Decrementa -1 no DynamoDB
                          response = table.update_item(
                              Key={'id': 'hits'},
                              UpdateExpression='ADD quantidade :dec',
                              ExpressionAttributeValues={':dec': -1},
                              ReturnValues='UPDATED_NEW'
                          )
                      else:
                          # Incrementa +1 no DynamoDB
                          response = table.update_item(
                              Key={'id': 'hits'},
                              UpdateExpression='ADD quantidade :inc',
                              ExpressionAttributeValues={':inc': 1},
                              ReturnValues='UPDATED_NEW'
                          )
                          
                      count = response['Attributes']['quantidade']
                      return {'statusCode': 200, 'headers': headers, 'body': json.dumps({'hits': int(count)})}

                  elif http_method == 'OPTIONS':
                      # Responde ao teste (Preflight) do navegador com sucesso
                      return {'statusCode': 200, 'headers': headers, 'body': ''}
                      
                  else:
                      return {'statusCode': 400, 'headers': headers, 'body': 'Metodo nao suportado'}
                      
              except Exception as e:
                  print(e) # O CloudWatch (autorizado na Role) vai gravar este erro
                  return {'statusCode': 500, 'headers': headers, 'body': json.dumps({'error': 'Erro interno no servidor'})}

  MyHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: APIWebsiteTCC
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Sub "https://${MyCloudFrontDistribution.DomainName}"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MyHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MyLambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  APIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MyHttpApi
      RouteKey: "ANY /"
      Target: !Sub "integrations/${LambdaIntegration}"

  StageApi:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MyHttpApi
      StageName: "$default"
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 10

  InvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MyLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MyHttpApi}/*/*"

  MyCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            # Aponta automaticamente para o Bucket S3 criado pelo YAML
            DomainName: !GetAtt MyS3Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: "" 
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false

Outputs:
  1ApiGatewayURL:
    Description: "URL do Gateway API para usar no script.js"
    Value: !Sub "https://${MyHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"

  2S3ConsoleURL:
    Description: "Link do bucket no console da AWS para enviar os arquivos"
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/s3/buckets/${MyS3Bucket}?region=${AWS::Region}&tab=objects"

  3WebsiteURL:
    Description: "URL do seu site hospedado no S3"
    Value: !Sub "http://${MyS3Bucket}.s3-website-${AWS::Region}.amazonaws.com"
  
  4CloudFrontURL:
    Description: "URL final do site com HTTPS usando CloudFront"
    Value: !Sub "https://${MyCloudFrontDistribution.DomainName}"
